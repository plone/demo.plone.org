---
version: "3.8"

services:
  frontend:
    image: ghcr.io/plone/demo-next-frontend:${STACK_PARAM:-latest}
    environment:
      RAZZLE_INTERNAL_API_PATH: http://${STACK_NAME}_backend:8080/Plone
      RAZZLE_SUBPATH_PREFIX: /next
    networks:
      - demonext
      - public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
      labels:
        - traefik.enable=true
        - traefik.docker.network=public
        - traefik.constraint-label=public
        # Service
        - traefik.http.services.svc-demo-next-frontend.loadbalancer.server.port=3000
        # Routers
        ## /
        - traefik.http.routers.rt-demo-next-frontend.rule=Host(`demo.plone.org`) && PathPrefix(`/next`)
        - traefik.http.routers.rt-demo-next-frontend.entrypoints=https
        - traefik.http.routers.rt-demo-next-frontend.tls=true
        - traefik.http.routers.rt-demo-next-frontend.tls.certresolver=le
        - traefik.http.routers.rt-demo-next-frontend.service=svc-demo-next-frontend
        - traefik.http.routers.rt-demo-next-frontend.middlewares=gzip

  backend:
    image: ghcr.io/plone/demo-next-backend:latest
    networks:
      - public
      - demonext
    deploy:
      # Just one, as we do not have a shared database
      replicas: 1
      placement:
        constraints:
          - node.labels.type == app
      labels:
        - traefik.enable=true
        - traefik.docker.network=public
        - traefik.constraint-label=public
        # Service
        - traefik.http.services.demo-next-backend.loadbalancer.server.port=8080
        # Middleware
        - "traefik.http.middlewares.demo-next-backend-vhm.replacepathregex.regex=^/next/\\+\\+api\\+\\+($$|/.*)"
        - "traefik.http.middlewares.demo-next-backend-vhm.replacepathregex.replacement=/VirtualHostBase/https/demo.plone.org/Plone/++api++/VirtualHostRoot/_vh_next$$1"
        # Router
        - traefik.http.routers.demo-next-backend.rule=Host(`demo.plone.org`) && PathPrefix(`/next/++api++`)
        - traefik.http.routers.demo-next-backend.entrypoints=https
        - traefik.http.routers.demo-next-backend.tls=true
        - traefik.http.routers.demo-next-backend.service=demo-next-backend
        - traefik.http.routers.demo-next-backend.middlewares=gzip,demo-next-backend-vhm

networks:
  public:
    external: true
    name: public
  demonext:
    internal: true
    driver: overlay
